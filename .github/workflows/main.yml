name: Get Feed

on:
  schedule:
    - cron: '30 12 * * *'
  workflow_dispatch:

jobs:
  get-feed:
    runs-on: ubuntu-latest
    env:
      NOTION_API_TOKEN: ${{ secrets.NOTION_API_TOKEN }}
      NOTION_READER_DATABASE_ID: ${{ secrets.NOTION_READER_DATABASE_ID }}
      NOTION_FEEDS_DATABASE_ID: ${{ secrets.NOTION_FEEDS_DATABASE_ID }}
      RUN_FREQUENCY: 604800
      SYNC_CONTENT: true
      UPDATE_EXISTING: true
      FETCH_FULL_ARTICLE: true
      TRANSLATE_TO: zh-CN
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL || 'https://api.siliconflow.cn/v1' }}
      OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'Qwen/Qwen3.5-4B' }}
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Verify token (read)
        run: |
          code=$(curl -s -o /tmp/me.json -w "%{http_code}" \
            -H "Authorization: Bearer $NOTION_API_TOKEN" \
            -H "Notion-Version: 2022-06-28" \
            https://api.notion.com/v1/users/me)
          echo "users/me HTTP: $code"
          cat /tmp/me.json
          test "$code" = "200"

      - name: Install deps and sync RSS (lite)
        run: |
          mkdir -p "${{ runner.temp }}/rss-sync"
          cd "${{ runner.temp }}/rss-sync"
          npm init -y >/dev/null 2>&1
          npm install @notionhq/client@0.4.9 rss-parser@3.13.0 jsdom@24 @mozilla/readability@0.5.0 --no-save --no-package-lock
          cp "$GITHUB_WORKSPACE/notion-sync-lite.js" .
          node notion-sync-lite.js
